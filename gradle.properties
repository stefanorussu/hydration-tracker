# Impostazioni di Memoria
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX e Jetifier (Obbligatori per Compose)
android.useAndroidX=true
android.enableJetifier=true

# Stile Kotlin
kotlin.code.style=official

# Fix specifici per l'errore "Cannot mutate dependencies"
android.dependency.analysis.disable=true
android.newDsl=true
android.dependency.useConstraints=false

# Stabilit‡ per KSP e Kotlin
kotlin.incremental=false

android.extra.enableCheckDebugClasspath=false
org.gradle.vfs.watch=false